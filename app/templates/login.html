{% extends "base.html" %}

{% block content %}
<h1>Sign In</h1>
<form action="" method="post" nonvalidate>
    {{ form.hidden_tag() }}
    <p>
        {{ form.username.label }}<br>
        {{ form.username(size=32) }}
    </p>
    <p>
        {{ form.password.label }}<br>
        {{ form.password(size=32) }}
    </p>
    <p>{{ form.rememeber_me() }} {{ form.rememeber_me.label }}</p>
    <p>{{ form.submit() }}</p>
</form>
{% endblock %}
